services:
  - type: web
    name: sustainable-catalyst-site-intelligence
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SC_SI_ENVIRONMENT
        value: production
      - key: SC_SI_DEMO_MODE
        value: "true"
      - key: SC_SI_CORS_ORIGINS
        value: https://sustainablecatalyst.com
      - key: SC_SI_API_TOKEN
        sync: false
      - key: SC_SI_GA4_PROPERTY_ID
        sync: false
      - key: SC_SI_GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
      - key: SC_SI_SEARCH_CONSOLE_LIVE
        value: "true"
      - key: SC_SI_SEARCH_CONSOLE_SITE_URL
        value: https://sustainablecatalyst.com/
      - key: SC_SI_ECONOMICS_SUSTAINABILITY_ENABLED
        value: "true"
      - key: SC_SI_ECONOMICS_SUSTAINABILITY_TIMEOUT_SECONDS
        value: "9"
      - key: SC_SI_ECONOMICS_SUSTAINABILITY_CACHE_TTL_SECONDS
        value: "120"
      - key: SC_SI_INTERNATIONAL_LAW_OBSERVATORY_ENABLED
        value: "true"
      - key: SC_SI_INTERNATIONAL_LAW_OBSERVATORY_TIMEOUT_SECONDS
        value: "9"
      - key: SC_SI_INTERNATIONAL_LAW_OBSERVATORY_CACHE_TTL_SECONDS
        value: "120"
      - key: SC_SI_SCIENTIFIC_EARTH_SYSTEMS_ENABLED
        value: "true"
      - key: SC_SI_SCIENTIFIC_EARTH_SYSTEMS_TIMEOUT_SECONDS
        value: "9"
      - key: SC_SI_SCIENTIFIC_EARTH_SYSTEMS_CACHE_TTL_SECONDS
        value: "120"
      - key: SC_SI_HUMANITARIAN_CONFLICT_DISPLACEMENT_ENABLED
        value: "true"
      - key: SC_SI_HUMANITARIAN_CONFLICT_DISPLACEMENT_TIMEOUT_SECONDS
        value: "9"
      - key: SC_SI_HUMANITARIAN_CONFLICT_DISPLACEMENT_CACHE_TTL_SECONDS
        value: "90"

      - key: SC_SI_TRADE_ENERGY_RESOURCE_SECURITY_ENABLED
        value: "true"
      - key: SC_SI_TRADE_ENERGY_RESOURCE_SECURITY_TIMEOUT_SECONDS
        value: "9"
      - key: SC_SI_TRADE_ENERGY_RESOURCE_SECURITY_CACHE_TTL_SECONDS
        value: "120"
